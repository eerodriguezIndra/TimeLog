name: Build & Release (Windows + macOS)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: TimeLog
  APP_ID: com.edwin.timelog

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha7: ${{ steps.meta.outputs.sha7 }}
      semver: ${{ steps.meta.outputs.semver }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        shell: bash
        run: |
          sha7=$(git rev-parse --short=7 HEAD)
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            ver="${GITHUB_REF#refs/tags/}"
            semver="${ver#v}"
          else
            ver="v0.0.${GITHUB_RUN_NUMBER}-${sha7}"
            semver="0.0.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${ver}"   >> "$GITHUB_OUTPUT"
          echo "sha7=${sha7}"     >> "$GITHUB_OUTPUT"
          echo "semver=${semver}" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: meta
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Fyne packager
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build Windows .exe with embedded icon
        shell: pwsh
        env:
          CGO_ENABLED: '1'
        run: |
          fyne package `
            --os windows `
            --icon icono.png `
            --name "$env:APP_NAME" `
            --app-id "$env:APP_ID" `
            --app-version "${{ needs.meta.outputs.semver }}"
          if (!(Test-Path "TimeLog.exe")) {
            Get-ChildItem -Recurse -Filter *.exe
            throw "no se generó TimeLog.exe"
          }
          Move-Item -Force TimeLog.exe TimeLog-windows-amd64.exe
          Get-Item TimeLog-windows-amd64.exe | Select-Object Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: timelog-windows-amd64
          path: TimeLog-windows-amd64.exe
          if-no-files-found: error
          retention-days: 14

  build-macos:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13      # Intel x86_64
            arch: amd64
          - runner: macos-latest  # Apple Silicon (arm64)
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install Fyne packager
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Build macOS .app
        env:
          CGO_ENABLED: '1'
        run: |
          fyne package \
            --os darwin \
            --icon icono.png \
            --name "$APP_NAME" \
            --app-id "$APP_ID" \
            --app-version "${{ needs.meta.outputs.semver }}"
          if [ ! -d "TimeLog.app" ]; then
            ls -la
            echo "no se generó TimeLog.app"
            exit 1
          fi

      - name: Zip .app preservando estructura macOS
        run: |
          out="TimeLog-darwin-${{ matrix.arch }}.zip"
          # ditto preserva symlinks, permisos y atributos extendidos del bundle
          ditto -c -k --sequesterRsrc --keepParent TimeLog.app "$out"
          ls -lh "$out"

      - uses: actions/upload-artifact@v4
        with:
          name: timelog-darwin-${{ matrix.arch }}
          path: TimeLog-darwin-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 14

  release-github:
    needs: [meta, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Compute checksums
        working-directory: dist
        run: |
          ls -la
          sha256sum TimeLog-windows-amd64.exe   > TimeLog-windows-amd64.exe.sha256
          sha256sum TimeLog-darwin-amd64.zip    > TimeLog-darwin-amd64.zip.sha256
          sha256sum TimeLog-darwin-arm64.zip    > TimeLog-darwin-arm64.zip.sha256
          ls -la

      - name: Publish (or update) rolling release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly · ${{ needs.meta.outputs.version }}"
          body: |
            Build automático del último commit en `main`.

            - Commit: `${{ needs.meta.outputs.sha7 }}`
            - Versión: `${{ needs.meta.outputs.version }}`

            **Descargas**

            | Plataforma | Archivo |
            |---|---|
            | Windows x64 (portable) | `TimeLog-windows-amd64.exe` |
            | macOS Intel | `TimeLog-darwin-amd64.zip` |
            | macOS Apple Silicon | `TimeLog-darwin-arm64.zip` |

            En macOS, al descomprimir verás `TimeLog.app`. Como no está
            firmado/notarizado, ábrelo con **clic derecho → Abrir** la
            primera vez, o ejecuta `xattr -dr com.apple.quarantine TimeLog.app`.
          prerelease: true
          files: |
            dist/TimeLog-windows-amd64.exe
            dist/TimeLog-windows-amd64.exe.sha256
            dist/TimeLog-darwin-amd64.zip
            dist/TimeLog-darwin-amd64.zip.sha256
            dist/TimeLog-darwin-arm64.zip
            dist/TimeLog-darwin-arm64.zip.sha256

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "TimeLog ${{ needs.meta.outputs.version }}"
          generate_release_notes: true
          files: |
            dist/TimeLog-windows-amd64.exe
            dist/TimeLog-windows-amd64.exe.sha256
            dist/TimeLog-darwin-amd64.zip
            dist/TimeLog-darwin-amd64.zip.sha256
            dist/TimeLog-darwin-arm64.zip
            dist/TimeLog-darwin-arm64.zip.sha256
